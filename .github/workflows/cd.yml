# Deploys after CI succeeds on a push to `main`.
# Configure GitHub secrets: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY.
# Clone the repo on the droplet at ~/user-management-system (or change the path in the script below).

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/user-management-system
            git pull origin main
            docker compose up -d --build
