services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: usermgmt
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d usermgmt"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/usermgmt
      PORT: 3001
      CORS_ORIGIN: http://localhost
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://backend:3001
    environment:
      API_URL: http://backend:3001
    ports:
      - "80:3000"
    depends_on:
      - backend

volumes:
  pgdata:
